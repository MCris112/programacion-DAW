<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(title='Detalles: ' + ${pokemon.nombre}, head=~{::#head}, content=~{::main})}">
<head>
    <div id="head">
        <style>
            .detail-card {
                background: var(--glass-bg);
                backdrop-filter: blur(20px);
                border: 1px solid var(--glass-border);
                border-radius: 40px;
                padding: 3rem;
                margin-top: 2rem;
                overflow: hidden;
                position: relative;
            }
            .detail-img {
                width: 300px;
                height: 300px;
                object-fit: contain;
                filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
                animation: float 4s ease-in-out infinite;
            }
            @keyframes float {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-20px); }
            }
            .detail-info {
                text-align: left;
            }
            .badge-type {
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                padding: 0.5rem 1.5rem;
                border-radius: 100px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 1px;
            }
        </style>
    </div>
</head>
<body>

<main class="container py-5 mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="detail-card animate-in">
                <div class="row align-items-center g-5">
                    <div class="col-md-5 text-center">
                        <div class="position-relative">
                            <div class="position-absolute top-50 start-50 translate-middle" style="width: 250px; height: 250px; background: var(--poke-red); filter: blur(100px); opacity: 0.2; z-index: -1;"></div>
                            <img th:src="${pokemon.imagen}" class="detail-img" th:alt="${pokemon.nombre}">
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="detail-info">
                            <span class="text-secondary fw-bold mb-2 d-block" th:text="'ID: #' + ${pokemon.numero}">ID: #001</span>
                            <h1 class="display-3 fw-bold mb-4" th:text="${pokemon.nombre}" style="text-transform: capitalize;">Bulbasaur</h1>
                            
                            <div class="d-flex gap-2 mb-5">
                                <span class="badge-type">Pokémon</span>
                                <!-- Add more types info if available in the object -->
                            </div>
                            
                            <div class="row g-4 mb-5">
                                <div class="col-6 col-sm-4">
                                    <h6 class="text-secondary mb-1">Altura</h6>
                                    <p class="h5">-- m</p>
                                </div>
                                <div class="col-6 col-sm-4">
                                    <h6 class="text-secondary mb-1">Peso</h6>
                                    <p class="h5">-- kg</p>
                                </div>
                                <div class="col-6 col-sm-4">
                                    <h6 class="text-secondary mb-1">Habilidad</h6>
                                    <p class="h5">--</p>
                                </div>
                            </div>
                            
                            <a href="/" class="btn-poke">
                                <i class="bi bi-arrow-left me-2"></i> Volver a la Lista
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
