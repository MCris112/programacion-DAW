<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error 404 – No encontrado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pokemon.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: menu}"></div>

<div class="error-container">
    <h1>404</h1>
    <h2>Página no encontrada</h2>
    <!-- IMAGEN DEL ERROR 404 -->
    <img class="error404"
         th:src="@{https://www.raquelbegue.com/blog/wp-content/uploads/2014/01/404-charizard.jpg}"
         alt="Página no encontrada"
    />
    <p>Lo sentimos, la página que buscas no existe.</p>
    <a class="button" th:href="@{/pokemon}">Ir a la Pokédex </a> ➡️
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
