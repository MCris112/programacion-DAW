<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, head, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title ?: 'Pokédex'}">Pokédex</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Page specific head content -->
    <th:block th:replace="${head} ?: ~{}"></th:block>
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navbar Fragment -->
    <div th:replace="~{fragments/navbar :: menu}"></div>

    <!-- Main Content -->
    <main th:replace="${content}"></main>

    <!-- Global Footer -->
    <footer class="py-4 text-center mt-auto border-top border-secondary border-opacity-10" style="background: rgba(15, 23, 42, 0.4)">
        <div class="container text-secondary">
            <p class="mb-0 small">© 2026 Pokédex Spring Boot - Desarrollado con ⚡ y ☕</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
