<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(title='Generación ' + ${generation} + ' - Pokédex', head=~{}, content=~{::main})}">
<head>
</head>
<body>

<main class="container mb-5 pb-5 mt-4">
    <div class="text-center mb-5 animate-in">
        <h1 class="display-4 fw-bold">Pokémon de la <span class="text-danger" th:text="'Generación ' + ${generation}">Generación #</span></h1>
        <p class="text-secondary">Explorando los descubrimientos de esta región específica.</p>
    </div>

    <div class="row g-4 justify-content-center">
        <!-- Pokémon Card Loop -->
        <div class="col-6 col-sm-4 col-md-3 col-lg-2 animate-in" 
             th:each="pokemon, iter : ${pokemons}"
             th:style="'animation-delay: ' + (${iter.index} * 0.05) + 's'">
            
            <div class="pokemon-card">
                <div class="card-img-container">
                    <img th:src="${pokemon.imagen}" class="card-img-top" th:alt="${pokemon.nombre}">
                </div>
                <div class="card-body">
                    <span class="pokemon-id" th:text="'#' + ${pokemon.numero}">#001</span>
                    <h5 class="pokemon-name" th:text="${pokemon.nombre}">Bulbasaur</h5>
                    
                    <a th:href="@{/pokemons/{id}(id=${pokemon.numero})}" class="btn-poke w-100">
                        Ver Detalles
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
