<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(title='Inicio - Pokédex', head=~{::#head}, content=~{::main})}">
<head>
    <div id="head">
        <style>
            .glass-search {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 15px;
                padding: 0.5rem;
                backdrop-filter: blur(5px);
            }
            .glass-search input::placeholder {
                color: rgba(255, 255, 255, 0.3);
            }
            .glass-search input:focus {
                box-shadow: none;
                outline: none;
            }
        </style>
    </div>
</head>
<body>

<main>
    <!-- Hero Section -->
    <header class="py-5 mt-4">
        <div class="container text-center animate-in">
            <h1 class="display-3 fw-800 mb-3" style="font-weight: 800;">
                Explora el Mundo <span style="color: var(--poke-red)">Pokémon</span>
            </h1>
            <p class="lead text-secondary mx-auto mb-5" style="max-width: 700px;">
                Tu Pokédex definitiva impulsada por Spring Boot. Descubre información detallada, tipos y habilidades de todos tus Pokémon favoritos.
            </p>
            
            <!-- Quick Search Bar -->
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="input-group mb-3 glass-search">
                        <span class="input-group-text bg-transparent border-0 text-secondary">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text" class="form-control bg-transparent border-0 text-white" placeholder="Busca por nombre o número...">
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Pokémon Grid -->
    <div class="container mb-5 pb-5 mt-4">
        <div class="row g-4 justify-content-center">
            <!-- Pokémon Card Loop -->
            <div class="col-6 col-sm-4 col-md-3 col-lg-2 animate-in" 
                 th:each="pokemon, iter : ${pokemons}"
                 th:style="'animation-delay: ' + (${iter.index} * 0.05) + 's'">
                
                <div class="pokemon-card">
                    <div class="card-img-container">
                        <img th:src="${pokemon.imagen}" class="card-img-top" th:alt="${pokemon.nombre}">
                    </div>
                    <div class="card-body">
                        <span class="pokemon-id" th:text="'#' + ${pokemon.numero}">#001</span>
                        <h5 class="pokemon-name" th:text="${pokemon.nombre}">Bulbasaur</h5>
                        
                        <a th:href="@{/pokemons/{id}(id=${pokemon.numero})}" class="btn-poke w-100">
                            Ver Detalles
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
