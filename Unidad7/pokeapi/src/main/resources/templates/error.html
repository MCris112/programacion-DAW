<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(title='404 - No Encontrado', head=~{}, content=~{::main})}">
<head>
</head>
<body>

<main class="container py-5 mt-5">
    <div class="row justify-content-center text-center">
        <div class="col-md-8">
            <div class="animate-in" style="background: var(--glass-bg); padding: 4rem; border-radius: 40px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px);">
                <h1 class="display-1 fw-bold text-danger mb-0">404</h1>
                <h2 class="display-6 fw-bold mb-4">¡Un Pokémon salvaje bloquea el camino!</h2>
                
                <div class="mb-5">
                    <img src="https://www.raquelbegue.com/blog/wp-content/uploads/2014/01/404-charizard.jpg" 
                         class="img-fluid rounded-4 shadow-lg" 
                         alt="404 Error" 
                         style="max-height: 400px; border: 1px solid var(--glass-border);">
                </div>

                <p class="lead text-secondary mb-5">Lo sentimos, pero no hemos podido encontrar la página que buscas en nuestra base de datos.</p>
                
                <a href="/" class="btn-poke">
                    <i class="bi bi-house-door me-2"></i> Volver a la Pokédex
                </a>
            </div>
        </div>
    </div>
</main>

</body>
</html>
